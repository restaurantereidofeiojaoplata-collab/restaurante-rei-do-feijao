<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Reiniciando Tour...</title></head>
<body style="background:#0e0e10;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px;">
<svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#10b981" stroke-width="3" stroke-dasharray="80" stroke-dashoffset="20" style="animation:spin 1s linear infinite;transform-origin:center"/><style>@keyframes spin{to{transform:rotate(360deg)}}</style></svg>
<p style="color:#10b981;font-weight:700;font-size:14px;">Reiniciando o tour de boas-vindas...</p>
<script>
  try {
    const userRaw = localStorage.getItem("gourmet_user");
    if (userRaw) {
      const user = JSON.parse(userRaw);
      if (user && user.id) {
        localStorage.removeItem("gourmet_tour_completed_" + user.id);
        console.log("Tour resetado para usuario:", user.id);
      }
    }
    // Limpa todas as chaves de tour por seguranca
    Object.keys(localStorage).forEach(function(k) {
      if (k.startsWith("gourmet_tour_completed_")) localStorage.removeItem(k);
    });
  } catch(e) { console.error(e); }
  setTimeout(function(){ window.location.href = "/"; }, 800);
</script>
</body>
</html>
